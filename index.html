<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quebra-Cabeça</title>
  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  /* fundo com imagem local + degradê escuro */
  background: linear-gradient(rgba(43, 35, 40, 0.7), rgba(197, 4, 100, 0.9)),
              url("fundo-puzzle.jpg") no-repeat center center fixed;
  background-size: cover;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
    header {
      text-align: center;
      margin-bottom: 20px;
    }

    .puzzle-title {
      font-size: 2.5em;
      font-weight: bold;
      color: linear-gradient(135deg, rgba(230, 45, 189, 0.2), rgba(245, 214, 214, 0.05));
      display: inline-block;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.3);
      overflow: hidden;
    }

    .puzzle-title span {
      display: inline-block;
      opacity: 0;
      transform: translateY(-50px);
      animation: dropIn 0.6s forwards;
    }

    .puzzle-title span:nth-child(n) {
      animation-delay: calc(0.1s * var(--i));
    }

    @keyframes dropIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #game {
      display: grid;
      gap: 2px;
      margin: 20px;
      width: 90vw;
      max-width: 400px;
      height: 90vw;
      max-height: 400px;
    }

    .piece {
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }

    .glass-button {
      background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      padding: 10px 20px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      transition: all 0.3s ease;
    }

    .glass-button:hover {
      background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
    }

    #victory {
      display: none;
      font-size: 2em;
      color: rgb(229, 255, 0);
      margin-top: 20px;
    }

    #reference {
      margin-top: 20px;
    }

    #reference img {
      max-width: 90vw;
      border: 2px solid white;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h2 class="puzzle-title">Quebra Cabeça</h2>
  </header>

  <div>
    <button class="glass-button" onclick="startGame('easy')">Modo Fácil</button>
    <button class="glass-button" onclick="startGame('hard')">Modo Difícil</button>
    <button class="glass-button" onclick="restartGame()">Reiniciar</button>
  </div>

  <div id="game"></div>
  <div id="victory">🎉 Parabéns!! 🎉</div>
  <div id="reference"></div>

  <!-- Biblioteca de confete -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    let imageURL;
    let gridSize;
    let currentMode = "easy";

    function getNewImage() {
      // gera uma nova imagem aleatória
      return "https://picsum.photos/400?random=" + Math.floor(Math.random() * 1000);
    }

    function startGame(mode) {
      currentMode = mode;
      imageURL = getNewImage();
      document.getElementById("victory").style.display = "none";
      const game = document.getElementById("game");
      game.innerHTML = "";

      gridSize = mode === "easy" ? 3 : 5;
      game.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
      game.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

      const pieces = [];
      for (let i = 0; i < gridSize * gridSize; i++) {
        const piece = document.createElement("div");
        piece.classList.add("piece");
        piece.style.backgroundImage = `url(${imageURL})`;
        piece.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
        const x = i % gridSize;
        const y = Math.floor(i / gridSize);
        piece.style.backgroundPosition = `${(x / (gridSize - 1)) * 100}% ${(y / (gridSize - 1)) * 100}%`;
        piece.dataset.correct = i;
        pieces.push(piece);
      }

      pieces.sort(() => Math.random() - 0.5);
      pieces.forEach(p => {
        p.addEventListener("click", () => selectPiece(p));
        game.appendChild(p);
      });

      // mostra imagem de referência
      const refDiv = document.getElementById("reference");
      refDiv.innerHTML = `<img src="${imageURL}" alt="Imagem de referência">`;
    }

    function restartGame() {
      startGame(currentMode);
    }

    let firstSelected = null;
    function selectPiece(piece) {
      if (!firstSelected) {
        firstSelected = piece;
        piece.style.outline = "2px solid yellow";
      } else {
        swapPieces(firstSelected, piece);
        firstSelected.style.outline = "none";
        firstSelected = null;
        checkVictory();
      }
    }

    function swapPieces(p1, p2) {
      const temp = p1.style.backgroundPosition;
      p1.style.backgroundPosition = p2.style.backgroundPosition;
      p2.style.backgroundPosition = temp;

      const tempCorrect = p1.dataset.correct;
      p1.dataset.correct = p2.dataset.correct;
      p2.dataset.correct = tempCorrect;
    }

    function checkVictory() {
      const pieces = document.querySelectorAll(".piece");
      let correctCount = 0;
      pieces.forEach((p, i) => {
        if (parseInt(p.dataset.correct) === i) correctCount++;
      });
      if (correctCount === gridSize * gridSize) {
        document.getElementById("victory").style.display = "block";
        launchConfetti();
      }
    }

    function launchConfetti() {
      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      });
    }

    // Script para animar o título como puzzle
    const title = document.querySelector(".puzzle-title");
    const text = title.textContent;
    title.textContent = "";
    [...text].forEach((letter, i) => {
      const span = document.createElement("span");
      span.textContent = letter;
      span.style.setProperty("--i", i+1);
      title.appendChild(span);
    });
  </script>
</body>
</html>
